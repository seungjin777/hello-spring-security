<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 허가되지 않은 사용자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    </style>
</head>
<body>
<div class="container text-center mt-5">
    <h1 class="display-1 fw-bold text-danger">403</h1>
    <h4 class="mb-3">접근 권한이 없습니다.</h4>
    <p class="text-muted">이 페이지에 접근할 수 있는 권한이 없습니다.</p>
    <form th:action="@{/logout}" method="post">
        <button class="btn btn-outline-danger mt-3">로그아웃</button>
    </form>
    <a th:href="@{/home}" class="btn btn-outline-primary mt-3">홈으로 돌아가기</a>
</div>
<div th:replace="~{./commons::footer}"></div>
</body>
</html>
