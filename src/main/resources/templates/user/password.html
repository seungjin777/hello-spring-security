<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .welcome-card { border: none; border-radius: 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .stat-card { border: none; border-radius: 12px; transition: transform .2s; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
        .badge-role { font-size: .75rem; padding: .4em .7em; border-radius: 20px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/password}">비밀번호 변경</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<!-- change password form -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card detail-card p-5">
                <h3 class="fw-bold mb-1">비밀번호 변경 폼</h3>
                <br>

                <form id="passwdForm" th:action="@{/user/password}" method="post" onsubmit="return confirm('변경하시겠습니까?')" th:object="${passwordChangeDto}">
                    <div class="mb-3">
                        <label>현재 비밀번호</label>
                        <input type="password" class="form-control" th:field="*{currentPassword}"/>
                        <span class="text-danger" th:errors="*{currentPassword}"></span>
                    </div>

                    <div class="mb-3">
                        <label>새 비밀번호</label>
                        <input type="text" class="form-control" th:field="*{newPassword}"/>
                        <span class="text-danger" th:errors="*{newPassword}"></span>
                    </div>

                    <div class="mb-3">
                        <label>새 비밀번호 확인</label>
                        <input type="text" class="form-control" th:field="*{confirmPassword}"/>
                        <span class="text-danger" th:errors="*{confirmPassword}"></span>
                    </div>

                </form>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" form="passwdForm" class="btn btn-outline-primary">비밀번호 변경</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- footer -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{./commons::footer}"></div>
</body>
</html>
